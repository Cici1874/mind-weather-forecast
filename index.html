<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏸 脑子天气预报</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="脑子天气">
<meta name="theme-color" content="#F5F0EB">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;700;900&family=ZCOOL+KuaiLe&display=swap');

:root {
  --bg: #F5F0EB;
  --bg2: #EDE7E0;
  --card: #FFFFFF;
  --border: #E0D8CE;
  --border-light: #EAE4DC;

  --blue: #1A3BC2;
  --blue-dim: rgba(26,59,194,0.10);
  --blue-light: #3D5BD6;

  --red: #E8553A;
  --red-dim: rgba(232,85,58,0.10);

  --yellow: #F2C94C;
  --yellow-dim: rgba(242,201,76,0.15);

  --charcoal: #2B2B2B;

  /* dimension accents — saturated to match this bold palette */
  --acc-mint: #1A8A5C;
  --acc-mint-dim: rgba(26,138,92,0.10);
  --acc-coral: #E8553A;
  --acc-coral-dim: rgba(232,85,58,0.10);
  --acc-lavender: #6B5BAE;
  --acc-lavender-dim: rgba(107,91,174,0.10);
  --acc-sky: #1A3BC2;
  --acc-sky-dim: rgba(26,59,194,0.10);
  --acc-amber: #D4960A;
  --acc-amber-dim: rgba(212,150,10,0.10);
  --acc-peach: #C46A2A;
  --acc-peach-dim: rgba(196,106,42,0.10);
  --acc-violet: #7B4BAE;
  --acc-violet-dim: rgba(123,75,174,0.10);
  --acc-yellow: #B8940A;
  --acc-yellow-dim: rgba(184,148,10,0.12);

  --text: #2B2B2B;
  --text2: #4A4A4A;
  --dim: #7A7268;
  --dimmer: #A89E94;
  --white: #FFFFFF;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

#app {
  max-width: 420px;
  margin: 0 auto;
  padding: 0 0 100px 0;
  position: relative;
}

.bg-shuttle {
  position: fixed; top: 20px; right: 6px;
  font-size: 72px; opacity: 0.05;
  transform: rotate(-20deg);
  pointer-events: none; z-index: 0;
}
.bg-shuttle-2 {
  position: fixed; bottom: 100px; left: -8px;
  font-size: 48px; opacity: 0.04;
  transform: rotate(35deg);
  pointer-events: none; z-index: 0;
}
/* Bold color blobs */
.bg-blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.bg-blob-1 {
  top: -80px; right: -60px;
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(26,59,194,0.06) 0%, transparent 70%);
}
.bg-blob-2 {
  bottom: -50px; left: -50px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(232,85,58,0.05) 0%, transparent 70%);
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: 40px 20px 14px;
  position: relative; z-index: 1;
}
.header-shuttle {
  width: 48px; height: 48px;
  display: inline-block;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-6deg); }
  50% { transform: translateY(-6px) rotate(6deg); }
}
.header h1 {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 24px;
  color: var(--blue);
  margin-top: 6px;
  letter-spacing: 2px;
}
.header .sub {
  font-size: 12px;
  color: var(--dim);
  margin-top: 6px;
}

/* ===== Philosophy card ===== */
.philo-card {
  margin: 0 16px 14px;
  padding: 14px 18px 14px 22px;
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border-light);
  position: relative; z-index: 1;
  box-shadow: 0 2px 10px rgba(43,43,43,0.05);
  overflow: hidden;
}
.philo-card::after {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(to bottom, var(--blue), var(--red));
  border-radius: 4px 0 0 4px;
}
.philo-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
}
.philo-source {
  font-size: 11px;
  color: var(--dimmer);
  margin-top: 6px;
  text-align: right;
}

/* ===== Date bar ===== */
.date-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 20px; margin-bottom: 14px;
  position: relative; z-index: 1;
}
.date-text { font-size: 13px; color: var(--dim); }
.streak-pill {
  font-size: 11px; font-weight: 600;
  color: var(--red);
  background: var(--red-dim);
  padding: 4px 12px; border-radius: 20px;
  display: flex; align-items: center; gap: 4px;
  border: 1px solid rgba(232,85,58,0.18);
}

/* ===== Content ===== */
.content { padding: 0 16px; position: relative; z-index: 1; }

/* ===== Question cards ===== */
.q-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 10px;
  border: 1px solid var(--border-light);
  transition: all 0.25s;
  box-shadow: 0 1px 6px rgba(43,43,43,0.04);
}
.q-card.answered {
  border-color: var(--blue);
  box-shadow: 0 2px 12px rgba(26,59,194,0.1);
}
.q-label {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.q-label .icon { font-size: 16px; }
.q-label .abstract {
  font-size: 11px; color: var(--dimmer); font-weight: 400;
  margin-left: auto;
  background: var(--bg2);
  padding: 2px 8px; border-radius: 8px;
}

.options { display: flex; gap: 6px; flex-wrap: wrap; }
.opt {
  flex: 1 1 0; min-width: 0;
  padding: 10px 4px; border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--dim); font-size: 12px;
  font-family: inherit; cursor: pointer;
  text-align: center; transition: all 0.15s;
  line-height: 1.3;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.opt:active { transform: scale(0.94); }
.opt .opt-emoji { font-size: 20px; }
.opt .opt-text { font-size: 11px; }

.opt-mint.sel { background: var(--acc-mint-dim); border-color: var(--acc-mint); color: var(--acc-mint); font-weight: 600; }
.opt-coral.sel { background: var(--acc-coral-dim); border-color: var(--acc-coral); color: var(--acc-coral); font-weight: 600; }
.opt-lavender.sel { background: var(--acc-lavender-dim); border-color: var(--acc-lavender); color: var(--acc-lavender); font-weight: 600; }
.opt-sky.sel { background: var(--acc-sky-dim); border-color: var(--acc-sky); color: var(--acc-sky); font-weight: 600; }
.opt-amber.sel { background: var(--acc-amber-dim); border-color: var(--acc-amber); color: var(--acc-amber); font-weight: 600; }
.opt-peach.sel { background: var(--acc-peach-dim); border-color: var(--acc-peach); color: var(--acc-peach); font-weight: 600; }
.opt-violet.sel { background: var(--acc-violet-dim); border-color: var(--acc-violet); color: var(--acc-violet); font-weight: 600; }
.opt-yellow.sel { background: var(--acc-yellow-dim); border-color: var(--acc-yellow); color: var(--acc-yellow); font-weight: 600; }

/* ===== Note ===== */
.note-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 10px;
  border: 1px solid var(--border-light);
  box-shadow: 0 1px 6px rgba(43,43,43,0.04);
}
.note-card textarea {
  width: 100%; background: transparent;
  border: none; color: var(--text);
  font-size: 13px; font-family: inherit;
  resize: none; outline: none;
  min-height: 40px; line-height: 1.6;
}
.note-card textarea::placeholder { color: var(--dimmer); }

/* ===== Submit ===== */
.submit-wrap { margin: 20px 0; text-align: center; }
.btn-submit {
  width: 100%; padding: 15px;
  border-radius: 16px; border: none;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 17px; cursor: pointer;
  transition: all 0.2s; letter-spacing: 1px;
}
.btn-submit.ready {
  background: var(--blue);
  color: var(--white);
  box-shadow: 0 4px 18px rgba(26,59,194,0.3);
}
.btn-submit.ready:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(26,59,194,0.2); }
.btn-submit.not-ready {
  background: var(--bg2);
  color: var(--dimmer);
  border: 1.5px dashed var(--border);
}

/* ===== Done state ===== */
.done-card {
  background: var(--card);
  border-radius: 20px;
  padding: 36px 24px;
  text-align: center;
  border: 1.5px solid var(--blue);
  margin-bottom: 16px;
  box-shadow: 0 4px 24px rgba(26,59,194,0.1);
  position: relative; overflow: hidden;
}
.done-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--blue), var(--red), var(--yellow));
}
.done-shuttle { font-size: 52px; display: inline-block; animation: smash 2s ease-in-out infinite; }
@keyframes smash {
  0%,100% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(-12deg) scale(1.08); }
  50% { transform: rotate(5deg) scale(1); }
}
.done-title {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 22px; color: var(--blue);
  margin-top: 12px;
}
.done-sub {
  font-size: 13px; color: var(--dim);
  margin-top: 10px; line-height: 1.6;
}
.done-abstract {
  font-size: 12px; color: var(--dimmer);
  margin-top: 14px; font-style: italic;
  background: var(--bg2);
  display: inline-block;
  padding: 6px 14px; border-radius: 10px;
}

/* ===== Nav ===== */
.nav-bar {
  position: fixed; bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 420px;
  display: flex;
  background: var(--card);
  border-top: 1px solid var(--border-light);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
  box-shadow: 0 -2px 12px rgba(43,43,43,0.05);
}
.nav-tab {
  flex: 1; padding: 10px 0 8px;
  text-align: center; cursor: pointer;
  border: none; background: transparent;
  font-family: inherit;
  color: var(--dimmer); font-size: 11px;
  transition: color 0.2s;
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
}
.nav-tab .nav-icon { font-size: 18px; }
.nav-tab.active { color: var(--blue); font-weight: 600; }

/* ===== Report ===== */
.report-dim-card {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border-light);
  margin-bottom: 10px;
  box-shadow: 0 1px 6px rgba(43,43,43,0.04);
}
.report-dim-label {
  font-size: 12px; color: var(--dim); font-weight: 600;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.report-bars { display: flex; gap: 4px; align-items: flex-end; height: 44px; }
.report-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.3s; }
.report-bar-labels { display: flex; gap: 4px; margin-top: 4px; }
.report-bar-label { flex: 1; font-size: 9px; color: var(--dimmer); text-align: center; }
.report-summary {
  font-size: 12px; color: var(--dim);
  line-height: 1.6; margin-top: 8px;
  background: var(--bg2);
  padding: 8px 10px; border-radius: 8px;
}
.report-for-doc {
  background: var(--card);
  border-radius: 16px;
  padding: 18px;
  border: 2px solid var(--blue);
  margin-top: 20px;
  box-shadow: 0 4px 18px rgba(26,59,194,0.1);
}
.report-for-doc-title {
  font-size: 14px; font-weight: 700;
  color: var(--blue);
  margin-bottom: 10px;
}
.report-for-doc-text {
  font-size: 12px; color: var(--text);
  line-height: 1.8; white-space: pre-wrap;
}
.btn-copy {
  margin-top: 14px;
  padding: 12px 20px;
  border-radius: 12px; border: none;
  background: var(--blue);
  color: var(--white);
  font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  width: 100%;
  box-shadow: 0 2px 8px rgba(26,59,194,0.2);
}
.btn-copy:active { transform: scale(0.97); }

/* ===== History ===== */
.history-item {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border-light);
  margin-bottom: 8px;
  box-shadow: 0 1px 4px rgba(43,43,43,0.04);
}
.history-date { font-size: 12px; color: var(--dim); margin-bottom: 8px; font-weight: 600; }
.history-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.history-chip {
  font-size: 11px; padding: 3px 9px;
  border-radius: 8px;
  background: var(--blue-dim); color: var(--blue);
}
.history-chip.warn { background: var(--red-dim); color: var(--red); }
.history-chip.mid { background: var(--yellow-dim); color: var(--acc-yellow); }
.history-note {
  font-size: 11px; color: var(--dimmer);
  margin-top: 8px; font-style: italic;
  padding-left: 4px;
  border-left: 2px solid var(--border);
}

/* ===== Settings ===== */
.setting-row {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border-light);
  margin-bottom: 8px;
  display: flex; justify-content: space-between;
  align-items: center;
}
.setting-label { font-size: 13px; color: var(--text); }
.setting-action {
  padding: 7px 16px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--card);
  font-size: 12px; font-family: inherit;
  cursor: pointer; font-weight: 600;
  transition: all 0.15s;
}
.setting-action:active { transform: scale(0.95); }
.setting-export { color: var(--blue); border-color: var(--blue); }
.setting-danger { color: var(--red); border-color: var(--red); }

.instruction-card {
  background: var(--card);
  border-radius: 14px;
  padding: 16px 18px;
  border: 1px solid var(--border-light);
  margin-top: 16px;
}
.instruction-title {
  font-size: 13px; font-weight: 600;
  color: var(--blue);
  margin-bottom: 8px;
}
.instruction-steps {
  font-size: 12px; color: var(--dim);
  line-height: 1.8;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--dimmer);
  font-size: 13px;
  line-height: 1.8;
  white-space: pre-line;
}

/* ===== Answered card arc decoration ===== */
.q-card.answered { position: relative; }
.q-card.answered::after {
  content: '';
  position: absolute;
  top: 8px; right: 12px;
  width: 24px; height: 12px;
  border: 2px solid var(--blue);
  border-bottom: none;
  border-radius: 24px 24px 0 0;
  opacity: 0.2;
}

/* ===== Shuttle streak badge ===== */
.streak-badge {
  font-size: 11px; font-weight: 600;
  color: var(--red);
  background: var(--red-dim);
  padding: 4px 10px 4px 6px;
  border-radius: 12px 20px 20px 12px;
  display: flex; align-items: center; gap: 4px;
  border: 1px solid rgba(232,85,58,0.18);
  position: relative;
}
.streak-badge::before {
  content: '🏸';
  font-size: 13px;
}

/* ===== Net divider for report ===== */
.net-divider {
  height: 16px;
  margin: 14px 0;
  position: relative;
  display: flex;
  align-items: center;
}
.net-divider::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 1px;
  background: var(--border);
}
.net-divider::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 8px;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 8px,
    var(--border) 8px,
    var(--border) 9px
  );
  transform: translateY(-50%);
  opacity: 0.5;
}
.net-label {
  position: relative;
  z-index: 1;
  background: var(--bg);
  padding: 0 10px;
  margin: 0 auto;
  font-size: 10px;
  color: var(--dimmer);
  white-space: nowrap;
}

/* ===== Smash trajectory on toast ===== */
.toast-trajectory {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
  border-radius: 20px;
}
.toast-trajectory::before {
  content: '🏸';
  position: absolute;
  font-size: 20px;
  animation: smashFly 0.8s ease-out forwards;
  opacity: 0;
}
@keyframes smashFly {
  0% { top: 80%; left: -10%; opacity: 0.8; transform: rotate(0deg); }
  60% { top: 20%; left: 70%; opacity: 0.6; transform: rotate(180deg); }
  100% { top: -20%; left: 110%; opacity: 0; transform: rotate(360deg); }
}
.toast-trajectory::after {
  content: '';
  position: absolute;
  top: 50%; left: 10%;
  width: 80%; height: 40%;
  border: 2px dashed rgba(26,59,194,0.1);
  border-radius: 0 80% 0 0;
  border-bottom: none; border-left: none;
  animation: arcFade 0.8s ease-out forwards;
  transform: translateY(-100%);
}
@keyframes arcFade {
  0% { opacity: 0; } 30% { opacity: 0.4; } 100% { opacity: 0; }
}

/* ===== Abstract loading shimmer on options ===== */
.opt:not(.sel)::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 12px;
  background: linear-gradient(90deg, transparent 30%, rgba(26,59,194,0.03) 50%, transparent 70%);
  background-size: 200% 100%;
  opacity: 0;
}
.opt { position: relative; overflow: hidden; }

/* ===== Shuttle trail on page transitions ===== */
.shuttle-trail {
  position: fixed;
  top: 50%; left: -30px;
  font-size: 24px;
  z-index: 150;
  pointer-events: none;
  animation: trailFly 0.5s ease-out forwards;
}
@keyframes trailFly {
  0% { left: -30px; top: 60%; opacity: 0.7; transform: rotate(-30deg); }
  100% { left: 110%; top: 30%; opacity: 0; transform: rotate(15deg); }
}

/* ===== Random rotation for bg shuttles ===== */
.bg-shuttle { animation: bgDrift 20s ease-in-out infinite; }
@keyframes bgDrift {
  0%,100% { transform: rotate(-20deg) translateY(0); }
  50% { transform: rotate(-15deg) translateY(10px); }
}

.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.toast-overlay { position:fixed; inset:0; background:rgba(43,43,43,0.15); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:199; }
.toast {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--card);
  border: 2px solid var(--blue);
  border-radius: 20px;
  padding: 28px 36px; text-align: center;
  z-index: 200; animation: toastIn 0.3s ease;
  box-shadow: 0 20px 60px rgba(43,43,43,0.18);
  position: relative; overflow: hidden;
}
@keyframes toastIn { from { opacity:0; transform:translate(-50%,-50%) scale(0.9); } to { opacity:1; transform:translate(-50%,-50%) scale(1); } }
.toast-icon { font-size: 44px; position: relative; z-index: 1; }
.toast-text { font-size: 15px; color: var(--text); margin-top: 10px; font-weight: 600; position: relative; z-index: 1; }
.toast-sub { font-size: 12px; color: var(--dim); margin-top: 6px; line-height: 1.5; position: relative; z-index: 1; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
'use strict';

const SHUTTLE_SVG = `<svg viewBox="0 0 64 64" width="48" height="48" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="32" cy="20" rx="11" ry="14" fill="#FFFFFF" stroke="#1A3BC2" stroke-width="1.4"/>
  <ellipse cx="32" cy="18" rx="7" ry="9" fill="#F5F0EB" opacity="0.6"/>
  <line x1="24" y1="33" x2="18" y2="52" stroke="#1A3BC2" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="33" x2="26" y2="54" stroke="#1A3BC2" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="33" x2="38" y2="54" stroke="#1A3BC2" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="33" x2="46" y2="52" stroke="#1A3BC2" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="14" r="2.5" fill="#E8553A" opacity="0.8"/>
</svg>`;

const QUOTES = [
  { text: "未经审视的人生不值得过。", src: "苏格拉底" },

let records=[],currentTab='checkin',answers={},noteText='',toastData=null;

function getToday(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getWeekday(ds){return ['周日','周一','周二','周三','周四','周五','周六'][new Date(ds).getDay()];}
function todayDone(){return records.some(r=>r.date===getToday());}
function getStreak(){let s=0,d=new Date();if(!todayDone())d.setDate(d.getDate()-1);while(true){const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;if(records.some(r=>r.date===ds)){s++;d.setDate(d.getDate()-1);}else break;}return s;}
function getDayQuote(){const d=new Date();return QUOTES[(d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate())%QUOTES.length];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function saveData(){try{localStorage.setItem('brainweather_v4',JSON.stringify(records));}catch(e){}}

function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='className')el.className=v;

    else if(k.startsWith('on'))el[k]=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return el;
}

function dismissToast(){toastData=null;render();}

function renderCheckin(app){
  const hdr=h('div',{className:'header fade-in'});

}

function renderHistory(app){

    content.appendChild(sec);

  if(notes.length>0)docText+='\n【自由备注摘录】\n'+notes.slice(-5).join('\n');
  const netDiv2=h('div',{className:'net-divider'});
  netDiv2.appendChild(h('span',{className:'net-label'},'—— 可导出区域 ——'));
  content.appendChild(netDiv2);

  content.appendChild(dc);app.appendChild(content);
