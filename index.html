<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏸 脑子天气预报</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="脑子天气">
<meta name="theme-color" content="#F5F0EB">
<link rel="manifest" href="manifest.json?v=2.1.1">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon-120.png">
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap');

:root {
  --bg: #F5F0EB;
  --bg2: #EDE7E0;
  --card: #FFFFFF;
  --border: #E0D8CE;
  --border-light: #EAE4DC;

  --blue: #1A3BC2;
  --blue-dim: rgba(26,59,194,0.10);
  --blue-light: #3D5BD6;

  --red: #E8553A;
  --red-dim: rgba(232,85,58,0.10);

  --yellow: #F2C94C;
  --yellow-dim: rgba(242,201,76,0.15);

  --charcoal: #2B2B2B;

  --acc-mint: #1A8A5C;
  --acc-mint-dim: rgba(26,138,92,0.10);
  --acc-coral: #E8553A;
  --acc-coral-dim: rgba(232,85,58,0.10);
  --acc-lavender: #6B5BAE;
  --acc-lavender-dim: rgba(107,91,174,0.10);
  --acc-sky: #1A3BC2;
  --acc-sky-dim: rgba(26,59,194,0.10);
  --acc-amber: #D4960A;
  --acc-amber-dim: rgba(212,150,10,0.10);
  --acc-peach: #C46A2A;
  --acc-peach-dim: rgba(196,106,42,0.10);
  --acc-violet: #7B4BAE;
  --acc-violet-dim: rgba(123,75,174,0.10);
  --acc-yellow: #B8940A;
  --acc-yellow-dim: rgba(184,148,10,0.12);
  --acc-rose: #C24B6E;
  --acc-rose-dim: rgba(194,75,110,0.10);
  --acc-teal: #1A7A7A;
  --acc-teal-dim: rgba(26,122,122,0.10);
  --acc-orange: #C46A2A;
  --acc-orange-dim: rgba(196,106,42,0.10);

  --text: #2B2B2B;
  --text2: #4A4A4A;
  --dim: #7A7268;
  --dimmer: #A89E94;
  --white: #FFFFFF;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'M PLUS Rounded 1c', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

#app {
  max-width: 420px;
  margin: 0 auto;
  padding: 0 0 100px 0;
  position: relative;
}

.bg-shuttle {
  position: fixed; top: 20px; right: 6px;
  font-size: 72px; opacity: 0.05;
  transform: rotate(-20deg);
  pointer-events: none; z-index: 0;
  animation: bgDrift 20s ease-in-out infinite;
}
.bg-shuttle-2 {
  position: fixed; bottom: 100px; left: -8px;
  font-size: 48px; opacity: 0.04;
  transform: rotate(35deg);
  pointer-events: none; z-index: 0;
}
.bg-blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.bg-blob-1 {
  top: -80px; right: -60px;
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(26,59,194,0.06) 0%, transparent 70%);
}
.bg-blob-2 {
  bottom: -50px; left: -50px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(232,85,58,0.05) 0%, transparent 70%);
}

@keyframes bgDrift {
  0%,100% { transform: rotate(-20deg) translateY(0); }
  50% { transform: rotate(-15deg) translateY(10px); }
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: 40px 20px 14px;
  position: relative; z-index: 1;
}
.header-shuttle {
  width: 48px; height: 48px;
  display: inline-block;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-6deg); }
  50% { transform: translateY(-6px) rotate(6deg); }
}
.header h1 {
  font-weight: 700;
  font-size: 24px;
  color: var(--blue);
  margin-top: 6px;
  letter-spacing: 2px;
}
.header .sub {
  font-size: 12px;
  color: var(--dim);
  margin-top: 6px;
}

/* ===== Philosophy card ===== */
.philo-card {
  margin: 0 16px 14px;
  padding: 14px 18px 14px 22px;
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border-light);
  position: relative; z-index: 1;
  box-shadow: 0 2px 10px rgba(43,43,43,0.05);
  overflow: hidden;
}
.philo-card::after {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(to bottom, var(--blue), var(--red));
  border-radius: 4px 0 0 4px;
}
.philo-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
}
.philo-source {
  font-size: 11px;
  color: var(--dimmer);
  margin-top: 6px;
  text-align: right;
}

/* ===== Date bar ===== */
.date-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 20px; margin-bottom: 14px;
  position: relative; z-index: 1;
}
.date-text { font-size: 13px; color: var(--dim); }

/* ===== Mode selector ===== */
.mode-selector {
  display: flex; gap: 8px;
  padding: 0 16px; margin-bottom: 14px;
  position: relative; z-index: 1;
}
.mode-btn {
  flex: 1;
  padding: 14px 12px;
  border-radius: 14px;
  border: 2px solid var(--border);
  background: var(--card);
  font-weight: 700;
  font-size: 16px;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  letter-spacing: 1px;
}
.mode-btn:active { transform: scale(0.96); }
.mode-btn.sel-school {
  border-color: var(--blue);
  background: var(--blue-dim);
  color: var(--blue);
  box-shadow: 0 2px 12px rgba(26,59,194,0.12);
}
.mode-btn.sel-rest {
  border-color: var(--acc-teal);
  background: var(--acc-teal-dim);
  color: var(--acc-teal);
  box-shadow: 0 2px 12px rgba(26,122,122,0.12);
}

/* ===== Content ===== */
.content { padding: 0 16px; position: relative; z-index: 1; }

/* ===== Question cards ===== */
.q-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 10px;
  border: 1px solid var(--border-light);
  transition: all 0.25s;
  box-shadow: 0 1px 6px rgba(43,43,43,0.04);
}
.q-card.answered {
  border-color: var(--blue);
  box-shadow: 0 2px 12px rgba(26,59,194,0.1);
}
.q-label {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.q-label .icon { font-size: 16px; }
.q-label .abstract {
  font-size: 11px; color: var(--dimmer); font-weight: 400;
  margin-left: auto;
  background: var(--bg2);
  padding: 2px 8px; border-radius: 8px;
}

.options { display: flex; gap: 6px; flex-wrap: wrap; }
.opt {
  flex: 1 1 0; min-width: 0;
  padding: 10px 4px; border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--dim); font-size: 12px;
  font-family: inherit; cursor: pointer;
  text-align: center; transition: all 0.15s;
  line-height: 1.3;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  position: relative; overflow: hidden;
}
.opt:active { transform: scale(0.94); }
.opt .opt-emoji { font-size: 20px; }
.opt .opt-text { font-size: 11px; }

.opt-mint.sel { background: var(--acc-mint-dim); border-color: var(--acc-mint); color: var(--acc-mint); font-weight: 600; }
.opt-coral.sel { background: var(--acc-coral-dim); border-color: var(--acc-coral); color: var(--acc-coral); font-weight: 600; }
.opt-lavender.sel { background: var(--acc-lavender-dim); border-color: var(--acc-lavender); color: var(--acc-lavender); font-weight: 600; }
.opt-sky.sel { background: var(--acc-sky-dim); border-color: var(--acc-sky); color: var(--acc-sky); font-weight: 600; }
.opt-amber.sel { background: var(--acc-amber-dim); border-color: var(--acc-amber); color: var(--acc-amber); font-weight: 600; }
.opt-peach.sel { background: var(--acc-peach-dim); border-color: var(--acc-peach); color: var(--acc-peach); font-weight: 600; }
.opt-violet.sel { background: var(--acc-violet-dim); border-color: var(--acc-violet); color: var(--acc-violet); font-weight: 600; }
.opt-yellow.sel { background: var(--acc-yellow-dim); border-color: var(--acc-yellow); color: var(--acc-yellow); font-weight: 600; }
.opt-rose.sel { background: var(--acc-rose-dim); border-color: var(--acc-rose); color: var(--acc-rose); font-weight: 600; }
.opt-teal.sel { background: var(--acc-teal-dim); border-color: var(--acc-teal); color: var(--acc-teal); font-weight: 600; }
.opt-orange.sel { background: var(--acc-orange-dim); border-color: var(--acc-orange); color: var(--acc-orange); font-weight: 600; }

/* ===== Vent text box ===== */
.vent-box {
  margin-top: 10px;
  animation: fadeIn 0.3s ease;
}
.vent-box textarea {
  width: 100%; background: var(--bg2);
  border: 1.5px dashed var(--acc-rose);
  border-radius: 12px;
  color: var(--text);
  font-size: 13px; font-family: inherit;
  resize: none; outline: none;
  min-height: 60px; line-height: 1.6;
  padding: 10px 14px;
}
.vent-box textarea::placeholder { color: var(--dimmer); }
.vent-privacy {
  font-size: 10px; color: var(--acc-rose);
  margin-top: 6px; text-align: center;
  opacity: 0.8;
}

/* ===== Exercise feel sub-question ===== */
.sub-question {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
  animation: fadeIn 0.3s ease;
}
.sub-question .sub-label {
  font-size: 12px; color: var(--dim);
  margin-bottom: 8px; font-weight: 600;
}

/* ===== Note ===== */
.note-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 10px;
  border: 1px solid var(--border-light);
  box-shadow: 0 1px 6px rgba(43,43,43,0.04);
}
.note-card textarea {
  width: 100%; background: transparent;
  border: none; color: var(--text);
  font-size: 13px; font-family: inherit;
  resize: none; outline: none;
  min-height: 40px; line-height: 1.6;
}
.note-card textarea::placeholder { color: var(--dimmer); }

/* ===== Submit ===== */
.submit-wrap { margin: 20px 0; text-align: center; }
.btn-submit {
  width: 100%; padding: 15px;
  border-radius: 16px; border: none;
  font-weight: 700;
  font-size: 17px; cursor: pointer;
  transition: all 0.2s; letter-spacing: 1px;
}
.btn-submit.ready {
  background: var(--blue);
  color: var(--white);
  box-shadow: 0 4px 18px rgba(26,59,194,0.3);
}
.btn-submit.ready:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(26,59,194,0.2); }
.btn-submit.not-ready {
  background: var(--bg2);
  color: var(--dimmer);
  border: 1.5px dashed var(--border);
}

/* ===== Done state ===== */
.done-card {
  background: var(--card);
  border-radius: 20px;
  padding: 36px 24px;
  text-align: center;
  border: 1.5px solid var(--blue);
  margin-bottom: 16px;
  box-shadow: 0 4px 24px rgba(26,59,194,0.1);
  position: relative; overflow: hidden;
}
.done-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--blue), var(--red), var(--yellow));
}
.done-shuttle { font-size: 52px; display: inline-block; animation: smash 2s ease-in-out infinite; }
@keyframes smash {
  0%,100% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(-12deg) scale(1.08); }
  50% { transform: rotate(5deg) scale(1); }
}
.done-title {
  font-weight: 700;
  font-size: 22px; color: var(--blue);
  margin-top: 12px;
}
.done-sub {
  font-size: 13px; color: var(--dim);
  margin-top: 10px; line-height: 1.6;
}
.done-abstract {
  font-size: 12px; color: var(--dimmer);
  margin-top: 14px; font-style: italic;
  background: var(--bg2);
  display: inline-block;
  padding: 6px 14px; border-radius: 10px;
}

/* ===== Answered card arc decoration ===== */
.q-card.answered { position: relative; }
.q-card.answered::after {
  content: '';
  position: absolute;
  top: 8px; right: 12px;
  width: 24px; height: 12px;
  border: 2px solid var(--blue);
  border-bottom: none;
  border-radius: 24px 24px 0 0;
  opacity: 0.2;
}

/* ===== Shuttle streak badge ===== */
.streak-badge {
  font-size: 11px; font-weight: 600;
  color: var(--red);
  background: var(--red-dim);
  padding: 4px 10px 4px 6px;
  border-radius: 12px 20px 20px 12px;
  display: flex; align-items: center; gap: 4px;
  border: 1px solid rgba(232,85,58,0.18);
  position: relative;
}
.streak-badge::before {
  content: '🏸';
  font-size: 13px;
}

/* ===== Nav ===== */
.nav-bar {
  position: fixed; bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 420px;
  display: flex;
  background: var(--card);
  border-top: 1px solid var(--border-light);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
  box-shadow: 0 -2px 12px rgba(43,43,43,0.05);
}
.nav-tab {
  flex: 1; padding: 10px 0 8px;
  text-align: center; cursor: pointer;
  border: none; background: transparent;
  font-family: inherit;
  color: var(--dimmer); font-size: 11px;
  transition: color 0.2s;
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
}
.nav-tab .nav-icon { font-size: 18px; }
.nav-tab.active { color: var(--blue); font-weight: 600; }

/* ===== Report ===== */
.report-dim-card {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border-light);
  margin-bottom: 10px;
  box-shadow: 0 1px 6px rgba(43,43,43,0.04);
}
.report-dim-label {
  font-size: 12px; color: var(--dim); font-weight: 600;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.report-bars { display: flex; gap: 4px; align-items: flex-end; height: 44px; }
.report-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.3s; }
.report-bar-labels { display: flex; gap: 4px; margin-top: 4px; }
.report-bar-label { flex: 1; font-size: 9px; color: var(--dimmer); text-align: center; }
.report-summary {
  font-size: 12px; color: var(--dim);
  line-height: 1.6; margin-top: 8px;
  background: var(--bg2);
  padding: 8px 10px; border-radius: 8px;
}
.report-for-doc {
  background: var(--card);
  border-radius: 16px;
  padding: 18px;
  border: 2px solid var(--blue);
  margin-top: 20px;
  box-shadow: 0 4px 18px rgba(26,59,194,0.1);
}
.report-for-doc-title {
  font-size: 14px; font-weight: 700;
  color: var(--blue);
  margin-bottom: 10px;
}
.report-for-doc-text {
  font-size: 12px; color: var(--text);
  line-height: 1.8; white-space: pre-wrap;
}
.btn-copy {
  margin-top: 14px;
  padding: 12px 20px;
  border-radius: 12px; border: none;
  background: var(--blue);
  color: var(--white);
  font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  width: 100%;
  box-shadow: 0 2px 8px rgba(26,59,194,0.2);
}
.btn-copy:active { transform: scale(0.97); }

/* ===== Report section headers ===== */
.report-section-header {
  font-weight: 700;
  font-size: 16px;
  color: var(--blue);
  margin: 18px 0 10px;
  padding: 8px 0;
  display: flex; align-items: center; gap: 8px;
}
.report-section-header .section-icon { font-size: 18px; }

/* ===== Net divider ===== */
.net-divider {
  height: 16px;
  margin: 14px 0;
  position: relative;
  display: flex;
  align-items: center;
}
.net-divider::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 1px;
  background: var(--border);
}
.net-divider::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 8px;
  background: repeating-linear-gradient(90deg, transparent, transparent 8px, var(--border) 8px, var(--border) 9px);
  transform: translateY(-50%);
  opacity: 0.5;
}
.net-label {
  position: relative; z-index: 1;
  background: var(--bg);
  padding: 0 10px;
  margin: 0 auto;
  font-size: 10px;
  color: var(--dimmer);
  white-space: nowrap;
}

/* ===== History ===== */
.history-item {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border-light);
  margin-bottom: 8px;
  box-shadow: 0 1px 4px rgba(43,43,43,0.04);
}
.history-date { font-size: 12px; color: var(--dim); margin-bottom: 8px; font-weight: 600; }
.history-mode {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 6px;
  margin-left: 8px;
}
.history-mode.school { background: var(--blue-dim); color: var(--blue); }
.history-mode.rest { background: var(--acc-teal-dim); color: var(--acc-teal); }
.history-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.history-chip {
  font-size: 11px; padding: 3px 9px;
  border-radius: 8px;
  background: var(--blue-dim); color: var(--blue);
}
.history-chip.warn { background: var(--red-dim); color: var(--red); }
.history-chip.mid { background: var(--yellow-dim); color: var(--acc-yellow); }
.history-note {
  font-size: 11px; color: var(--dimmer);
  margin-top: 8px; font-style: italic;
  padding-left: 4px;
  border-left: 2px solid var(--border);
}

/* ===== History: vent indicator ===== */
.history-vent-indicator {
  font-size: 10px; color: var(--acc-rose);
  margin-top: 6px; display: flex; align-items: center; gap: 4px;
}

/* ===== History filter tabs ===== */
.history-filter {
  display: flex; gap: 6px;
  padding: 0 16px; margin-bottom: 12px;
}
.filter-btn {
  padding: 6px 14px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--card);
  font-size: 12px; font-family: inherit;
  color: var(--dim); cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); font-weight: 600; }

/* ===== Settings ===== */
.setting-row {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border-light);
  margin-bottom: 8px;
  display: flex; justify-content: space-between;
  align-items: center;
}
.setting-label { font-size: 13px; color: var(--text); }
.setting-action {
  padding: 7px 16px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--card);
  font-size: 12px; font-family: inherit;
  cursor: pointer; font-weight: 600;
  transition: all 0.15s;
}
.setting-action:active { transform: scale(0.95); }
.setting-export { color: var(--blue); border-color: var(--blue); }
.setting-danger { color: var(--red); border-color: var(--red); }

.instruction-card {
  background: var(--card);
  border-radius: 14px;
  padding: 16px 18px;
  border: 1px solid var(--border-light);
  margin-top: 16px;
}
.instruction-title {
  font-size: 13px; font-weight: 600;
  color: var(--blue);
  margin-bottom: 8px;
}
.instruction-steps {
  font-size: 12px; color: var(--dim);
  line-height: 1.8;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--dimmer);
  font-size: 13px;
  line-height: 1.8;
  white-space: pre-line;
}

/* ===== Toast ===== */
.toast-overlay { position:fixed; inset:0; background:rgba(43,43,43,0.15); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); z-index:199; }
.toast {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--card);
  border: 2px solid var(--blue);
  border-radius: 20px;
  padding: 28px 36px; text-align: center;
  z-index: 200; animation: toastIn 0.3s ease;
  box-shadow: 0 20px 60px rgba(43,43,43,0.18);
  overflow: hidden;
}

/* ===== Utility functions ===== */
function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekday(ds) {
  return ['周日','周一','周二','周三','周四','周五','周六'][new Date(ds).getDay()];
}
function todayDone() {
  return records.some(r => r.date === getToday());
}
function getTodayRecord() {
  return records.find(r => r.date === getToday());
}
function getStreak() {
  let s = 0, d = new Date();
  if (!todayDone()) d.setDate(d.getDate() - 1);
  while (true) {
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (records.some(r => r.date === ds)) { s++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return s;
}
function getDayQuote() {
  const d = new Date();
  return QUOTES[(d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate()) % QUOTES.length];
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

/* ===== Data persistence ===== */
const STORAGE_KEY = 'brainweather_v2';

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); } catch(e) {}
}
function loadData() {
  try {
    // Try v2 first
    const d2 = localStorage.getItem(STORAGE_KEY);
    if (d2) { records = JSON.parse(d2); return; }
    // Migrate v1 data
    const d1 = localStorage.getItem('brainweather_v4');
    if (d1) {
      const old = JSON.parse(d1);
      // Tag all v1 records as school mode
      records = old.map(r => ({ ...r, mode: 'school' }));
      saveData();
    }
  } catch(e) {}
}

/* ===== DOM helper ===== */
function h(tag, attrs, ...ch) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el[k] = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  ch.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

/* ===== Weekly report ===== */
function getWeekRange() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const end = new Date(now);
  end.setDate(end.getDate() - (day === 0 ? 0 : day));
  const start = new Date(end);
  start.setDate(start.getDate() - 6);
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return { start: fmt(start), end: fmt(end) };
}

function getWeekRecords() {
  const { start, end } = getWeekRange();
  return records.filter(r => r.date >= start && r.date <= end);
}

function isSunday() {
  return new Date().getDay() === 0;
}

function shouldShowWeeklyReminder() {
  if (!isSunday()) return false;
  if (getWeekRecords().length < 1) return false;
  const today = getToday();
  try {
    const dismissed = localStorage.getItem('brainweather_weekly_dismissed');
    if (dismissed === today) return false;
  } catch(e) {}
  return true;
}

function dismissWeeklyReminder() {
  showWeeklyReminder = false;
  try { localStorage.setItem('brainweather_weekly_dismissed', getToday()); } catch(e) {}
  render();
}

function openWeeklyReport() {
  showWeeklyReminder = false;
  showWeeklyReport = true;
  render();
  setTimeout(() => generateWeeklyCanvas(), 100);
}

function closeWeeklyReport() {
  showWeeklyReport = false;
  render();
}

function generateWeeklyCanvas() {
  const canvas = document.getElementById('weekly-canvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 2;
  const W = 750, H = 1200;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = '100%';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const weekRecs = getWeekRecords();
  const { start, end } = getWeekRange();
  const schoolRecs = weekRecs.filter(r => (r.mode || 'school') === 'school');
  const restRecs = weekRecs.filter(r => r.mode === 'rest');

  // Background
  ctx.fillStyle = '#F5F0EB';
  ctx.fillRect(0, 0, W, H);

  // Top gradient bar
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0, '#1A3BC2');
  grad.addColorStop(0.5, '#E8553A');
  grad.addColorStop(1, '#F2C94C');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, 6);

  // Title
  ctx.fillStyle = '#1A3BC2';
  ctx.font = '700 36px "M PLUS Rounded 1c"';
  ctx.textAlign = 'center';
  ctx.fillText('🏸 脑子天气周报', W/2, 60);

  // Date range
  ctx.fillStyle = '#7A7268';
  ctx.font = '400 18px "M PLUS Rounded 1c"';
  ctx.fillText(`${start} ~ ${end}`, W/2, 90);

  // Stats row
  ctx.font = '500 16px "M PLUS Rounded 1c"';
  ctx.fillText(`本周共记录 ${weekRecs.length} 天（上学日 ${schoolRecs.length} 天 / 休息日 ${restRecs.length} 天）`, W/2, 125);

  // Divider
  ctx.strokeStyle = '#E0D8CE';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(40, 145);
  ctx.lineTo(W - 40, 145);
  ctx.stroke();

  let y = 175;

  // Helper: draw a dimension summary
  function drawDim(label, icon, vals, maxVal, color) {
    if (vals.length === 0) return;
    const avg = vals.reduce((a,b) => a+b, 0) / vals.length;
    const sev = avg <= maxVal * 0.33 ? '轻微' : avg <= maxVal * 0.66 ? '中等' : '明显';
    const hc = vals.filter(v => v >= Math.ceil(maxVal * 0.66)).length;
    const hp = Math.round(hc / vals.length * 100);

    // Background card
    ctx.fillStyle = '#FFFFFF';
    roundRect(ctx, 30, y - 4, W - 60, 54, 12);
    ctx.fill();
    ctx.strokeStyle = '#EAE4DC';
    ctx.lineWidth = 1;
    roundRect(ctx, 30, y - 4, W - 60, 54, 12);
    ctx.stroke();

    // Icon + label
    ctx.fillStyle = color;
    ctx.font = '500 16px "M PLUS Rounded 1c"';
    ctx.textAlign = 'left';
    ctx.fillText(`${icon} ${label}`, 50, y + 20);

    // Severity
    ctx.fillStyle = avg > maxVal * 0.66 ? '#E8553A' : avg > maxVal * 0.33 ? '#D4960A' : '#1A8A5C';
    ctx.textAlign = 'right';
    ctx.fillText(`平均：${sev}`, W - 50, y + 14);
    ctx.fillStyle = '#7A7268';
    ctx.font = '400 13px "M PLUS Rounded 1c"';
    ctx.fillText(`${hp}% 中-重度`, W - 50, y + 36);

    // Mini bar chart
    const barW = 18, barGap = 4, barMaxH = 32;
    const barStartX = W/2 - ((vals.length * (barW + barGap)) / 2);
    vals.forEach((v, i) => {
      const barH = Math.max(4, (v / maxVal) * barMaxH);
      const bx = barStartX + i * (barW + barGap);
      const by = y + 44 - barH;
      ctx.fillStyle = v >= Math.ceil(maxVal * 0.66) ? '#E8553A' : v >= Math.ceil(maxVal * 0.33) ? '#F2C94C' : color;
      roundRect(ctx, bx, by, barW, barH, 3);
      ctx.fill();
    });

    y += 62;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // Shared dimensions
  const sharedIds = ['attention', 'emotion', 'sleep', 'body'];
  const dimColors = {
    attention:'#1A8A5C', initiation:'#E8553A', memory:'#6B5BAE', emotion:'#1A3BC2',
    time:'#D4960A', body:'#C46A2A', sleep:'#7B4BAE', outing:'#1A7A7A',
    exercise:'#1A8A5C', timeSpent:'#D4960A', boredom:'#C46A2A'
  };

  // Section: Shared
  ctx.fillStyle = '#1A3BC2';
  ctx.font = '700 20px "M PLUS Rounded 1c"';
  ctx.textAlign = 'left';
  ctx.fillText('📊 核心维度', 40, y);
  y += 16;

  sharedIds.forEach(dimId => {
    const q = Q_SCHOOL.find(qq => qq.id === dimId);
    if (!q) return;
    const allVals = weekRecs.map(r => r.answers[dimId]).filter(v => v !== undefined);
    const maxVal = q.options[q.options.length - 1].val;
    drawDim(q.label, q.icon, allVals, maxVal, dimColors[dimId] || '#1A3BC2');
  });

  // Section: School-only
  if (schoolRecs.length > 0) {
    y += 8;
    ctx.fillStyle = '#1A3BC2';
    ctx.font = '700 20px "M PLUS Rounded 1c"';
    ctx.textAlign = 'left';
    ctx.fillText('🏫 上学日', 40, y);
    y += 16;

    ['initiation', 'memory', 'time'].forEach(dimId => {
      const q = Q_SCHOOL.find(qq => qq.id === dimId);
      if (!q) return;
      const vals = schoolRecs.map(r => r.answers[dimId]).filter(v => v !== undefined);
      if (vals.length === 0) return;
      const maxVal = q.options[q.options.length - 1].val;
      drawDim(q.label, q.icon, vals, maxVal, dimColors[dimId] || '#1A3BC2');
    });
  }

  // Section: Rest-only
  if (restRecs.length > 0) {
    y += 8;
    ctx.fillStyle = '#1A7A7A';
    ctx.font = '700 20px "M PLUS Rounded 1c"';
    ctx.textAlign = 'left';
    ctx.fillText('🏖️ 休息日', 40, y);
    y += 16;

    ['outing', 'boredom', 'timeSpent'].forEach(dimId => {
      const q = Q_REST.find(qq => qq.id === dimId);
      if (!q) return;
      const vals = restRecs.map(r => r.answers[dimId]).filter(v => v !== undefined);
      if (vals.length === 0) return;
      const maxVal = q.options[q.options.length - 1].val;
      drawDim(q.label, q.icon, vals, maxVal, dimColors[dimId] || '#1A7A7A');
    });
  }

  // Vent summary
  const ventHigh = weekRecs.filter(r => r.answers.vent >= 2).length;
  if (ventHigh > 0) {
    y += 10;
    ctx.fillStyle = '#C24B6E';
    ctx.font = '500 15px "M PLUS Rounded 1c"';
    ctx.textAlign = 'center';
    ctx.fillText(`🔒 本周有 ${ventHigh} 天情绪压力较大`, W/2, y);
    y += 10;
  }

  // Streak
  const streak = getStreak();
  if (streak > 0) {
    y += 20;
    ctx.fillStyle = '#E8553A';
    ctx.font = '500 16px "M PLUS Rounded 1c"';
    ctx.textAlign = 'center';
    ctx.fillText(`🏸 当前连续打卡 ${streak} 天`, W/2, y);
  }

  // Footer
  y = Math.max(y + 40, H - 60);
  ctx.fillStyle = '#A89E94';
  ctx.font = '400 13px "M PLUS Rounded 1c"';
  ctx.textAlign = 'center';
  ctx.fillText('脑子天气预报 · 姐姐给你做的', W/2, y);
  ctx.fillText(`v${APP_VERSION}`, W/2, y + 20);

  // Resize canvas height to actual content
  const actualH = Math.min(y + 50, H);
  const tmpData = ctx.getImageData(0, 0, W * dpr, actualH * dpr);
  canvas.height = actualH * dpr;
  ctx.putImageData(tmpData, 0, 0);
}

function downloadWeeklyReport() {
  const canvas = document.getElementById('weekly-canvas');
  if (!canvas) return;
  const link = document.createElement('a');
  const { start, end } = getWeekRange();
  link.download = `脑子天气周报_${start}_${end}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function shareWeeklyReport() {
  const canvas = document.getElementById('weekly-canvas');
  if (!canvas) return;
  canvas.toBlob(blob => {
    if (navigator.share && navigator.canShare) {
      const { start, end } = getWeekRange();
      const file = new File([blob], `脑子天气周报_${start}_${end}.png`, { type: 'image/png' });
      navigator.share({ files: [file], title: '脑子天气周报' }).catch(() => {
        // Fallback to download
        downloadWeeklyReport();
      });
    } else {
      downloadWeeklyReport();
    }
  }, 'image/png');
}

  const q = getDayQuote();

    h('div', {className: 'philo-text'}, q.text),
    h('div', {className: 'philo-source'}, '—— ' + q.src)
  ));

  // Sunday weekly report reminder
  if (showWeeklyReminder) {
    const wr = getWeekRecords();
    app.appendChild(h('div', {className: 'weekly-reminder', onclick: openWeeklyReport},
      h('div', {className: 'weekly-reminder-icon'}, '📸'),
      h('div', {className: 'weekly-reminder-text'},
        h('div', {className: 'weekly-reminder-title'}, '本周结束啦！生成周报看看？'),
        h('div', {className: 'weekly-reminder-sub'}, `这周记录了 ${wr.length} 天，可以分享给姐姐了`)
      ),
      h('div', {className: 'weekly-reminder-arrow'}, '→')
    ));
  }

  const streak = getStreak();
  app.appendChild(h('div', {className: anim('date-bar')},
    h('div', {className: 'date-text'}, getToday() + ' ' + getWeekday(getToday())),
    streak > 0 ? h('div', {className: 'streak-badge'}, `连续${streak}天`) : null
  ));

  const content = h('div', {className: 'content'});

  if (todayDone()) {
    const rec = getTodayRecord();
    const mode = rec.mode || 'school';
    const absDone = mode === 'rest' ? ABSTRACT_DONE_REST : ABSTRACT_DONE_SCHOOL;
    const absMsg = absDone[Math.floor(Math.random() * absDone.length)];
    const sm = streak <= 7 ? (STREAK_MSGS[streak] || `连续${streak}天了！`) : `连续${streak}天！你比大部分成年人都能坚持。`;
    content.appendChild(h('div', {className: anim('done-card')},
      h('div', {className: 'done-shuttle'}, '🏸'),
      h('div', {className: 'done-title'}, '今天已经记录过啦'),
      h('div', {className: 'done-sub'}, sm),
      h('div', {className: 'done-abstract'}, absMsg)
    ));
  } else {
    // Mode selector
    const modeRow = h('div', {className: anim('mode-selector')});
    modeRow.appendChild(h('button', {
      className: 'mode-btn' + (currentMode === 'school' ? ' sel-school' : ''),
      onclick: () => { currentMode = 'school'; answers = {}; ventText = ''; animateTransition = true; render(); }
    }, '🏫 上学日'));
    modeRow.appendChild(h('button', {
      className: 'mode-btn' + (currentMode === 'rest' ? ' sel-rest' : ''),
      onclick: () => { currentMode = 'rest'; answers = {}; ventText = ''; animateTransition = true; render(); }
    }, '🏖️ 休息日'));
    app.appendChild(modeRow);

    if (!currentMode) {
      content.appendChild(h('div', {className: 'empty-state'}, '先选一下今天是上学日还是休息日 ☝️'));
    } else {
      const questions = getQuestions();
      questions.forEach((q, qi) => {
        const isAnswered = answers[q.id] !== undefined;
        const card = h('div', {className: anim('q-card') + (isAnswered ? ' answered' : ''), style: animateTransition ? {animationDelay: (qi * 0.04) + 's'} : {}});
        card.appendChild(h('div', {className: 'q-label'},
          h('span', {className: 'icon'}, q.icon),
          q.label,
          h('span', {className: 'abstract'}, q.abstract)
        ));

        const optRow = h('div', {className: 'options'});
        q.options.forEach(o => {
          optRow.appendChild(h('button', {
            className: 'opt opt-' + q.color + (answers[q.id] === o.val ? ' sel' : ''),
            onclick: () => { answers[q.id] = o.val; render(); }
          },
            h('span', {className: 'opt-emoji'}, o.emoji),
            h('span', {className: 'opt-text'}, o.text)
          ));
        });
        card.appendChild(optRow);

        // Vent text box
        if (q.isVent && answers[q.id] >= 2) {
          const vbox = h('div', {className: 'vent-box'});
          const ta = h('textarea', {
            placeholder: '这里只有你自己能看到，随便骂 🔒',
            rows: '3',
            oninput: e => { ventText = e.target.value; }
          });
          ta.value = ventText;
          vbox.appendChild(ta);
          vbox.appendChild(h('div', {className: 'vent-privacy'}, '🔐 不会出现在报告里，只有你能看到'));
          card.appendChild(vbox);
        }

        // Exercise sub-question
        if (q.hasSubQ && answers[q.id] >= q.subQ.showWhen) {
          const subDiv = h('div', {className: 'sub-question'});
          subDiv.appendChild(h('div', {className: 'sub-label'}, '运动后大脑感觉怎样？'));
          const subOpts = h('div', {className: 'options'});
          q.subQ.options.forEach(o => {
            subOpts.appendChild(h('button', {
              className: 'opt opt-' + q.color + (answers[q.subQ.id] === o.val ? ' sel' : ''),
              onclick: () => { answers[q.subQ.id] = o.val; render(); }
            },
              h('span', {className: 'opt-emoji'}, o.emoji),
              h('span', {className: 'opt-text'}, o.text)
            ));
          });
          subDiv.appendChild(subOpts);
          card.appendChild(subDiv);
        }

        content.appendChild(card);
      });

      // Note card
      const noteCard = h('div', {className: anim('note-card')});
      noteCard.appendChild(h('div', {className: 'q-label'},
        h('span', {className: 'icon'}, '✏️'), '备注',
        h('span', {className: 'abstract'}, '选填')
      ));
      const ta = h('textarea', {
        placeholder: '今天发生了什么值得一记的事？不写也完全没问题。',
        rows: '2',
        oninput: e => { noteText = e.target.value; }
      });
      ta.value = noteText;
      noteCard.appendChild(ta);
      content.appendChild(noteCard);

      // Submit button
      const questions2 = getQuestions();
      const requiredIds = [];
      questions2.forEach(q => {
        requiredIds.push(q.id);
        if (q.hasSubQ && answers[q.id] >= q.subQ.showWhen) {
          requiredIds.push(q.subQ.id);
        }
      });
      const allAnswered = requiredIds.every(id => answers[id] !== undefined);
      const remaining = requiredIds.filter(id => answers[id] === undefined).length;

      content.appendChild(h('div', {className: anim('submit-wrap')},
        h('button', {
          className: 'btn-submit ' + (allAnswered ? 'ready' : 'not-ready'),
          onclick: allAnswered ? submitCheckin : null
        }, allAnswered ? '🏸 发球！记录今天' : `还有 ${remaining} 项没选`)
      ));
    }
  }
  app.appendChild(content);
}

/* ===== Submit ===== */
function submitCheckin() {
  const record = {
    id: uid(),
    date: getToday(),
    ts: Date.now(),
    mode: currentMode,
    answers: {...answers},
    note: noteText.trim() || '',
  };
  // Store vent text separately (never exported)
  if (ventText.trim()) {
    record.ventText = ventText.trim();
  }
  records.push(record);
  saveData();

  // Pick completion message
  let sub;
  const absDone = currentMode === 'rest' ? ABSTRACT_DONE_REST : ABSTRACT_DONE_SCHOOL;
  sub = absDone[Math.floor(Math.random() * absDone.length)];

  // Exercise easter egg
  if (currentMode === 'rest' && answers.exercise >= 1 && answers.exerciseFeel !== undefined && answers.exerciseFeel <= 2) {
    sub = EXERCISE_EASTER_EGGS[Math.floor(Math.random() * EXERCISE_EASTER_EGGS.length)];
  }

  toastData = { icon: '🏸', text: '记录成功！', sub: sub };
  answers = {};
  noteText = '';
  ventText = '';
  currentMode = null;
  render();
  setTimeout(dismissToast, 2500);
}

/* ===== History page ===== */
function renderHistory(app) {
  app.appendChild(h('div', {className: anim('header')},
    h('div', {className: 'header-shuttle', innerHTML: SHUTTLE_SVG}),
    h('h1', null, '历史记录'),
    h('div', {className: 'sub'}, '你的大脑气象档案')
  ));

  // Filter tabs
  const filterRow = h('div', {className: anim('history-filter')});
  [{id:'all',label:'全部'},{id:'school',label:'🏫 上学日'},{id:'rest',label:'🏖️ 休息日'}].forEach(f => {
    filterRow.appendChild(h('button', {
      className: 'filter-btn' + (historyFilter === f.id ? ' active' : ''),
      onclick: () => { historyFilter = f.id; render(); }
    }, f.label));
  });
  app.appendChild(filterRow);

  const content = h('div', {className: 'content'});
  let filtered = [...records];
  if (historyFilter !== 'all') {
    filtered = filtered.filter(r => (r.mode || 'school') === historyFilter);
  }

  if (filtered.length === 0) {
    content.appendChild(h('div', {className: 'empty-state'}, '还没有记录\n你的大脑气象站尚未开始运营\n先去打一次卡吧 🏸'));
  } else {
    [...filtered].reverse().forEach(r => {
      const item = h('div', {className: anim('history-item')});
      const mode = r.mode || 'school';
      const modeLabel = mode === 'school' ? '上学日' : '休息日';
      item.appendChild(h('div', {className: 'history-date'},
        r.date + ' ' + getWeekday(r.date),
        h('span', {className: 'history-mode ' + mode}, modeLabel)
      ));

      const chips = h('div', {className: 'history-chips'});
      const qs = mode === 'rest' ? Q_REST : Q_SCHOOL;
      qs.forEach(q => {
        if (q.id === 'vent') return; // Don't show vent in chips
        const val = r.answers[q.id];
        if (val === undefined) return;
        const opt = q.options.find(o => o.val === val);
        if (!opt) return;
        const maxVal = q.options[q.options.length - 1].val;
        const sev = val >= maxVal * 0.75 ? 'warn' : val >= maxVal * 0.5 ? 'mid' : '';
        chips.appendChild(h('span', {className: 'history-chip' + (sev ? ' ' + sev : '')},
          opt.emoji + ' ' + q.label.slice(0, 4)
        ));
      });
      item.appendChild(chips);

      // Show exercise feel if present
      if (mode === 'rest' && r.answers.exerciseFeel !== undefined) {
        const exQ = Q_REST.find(q => q.id === 'exercise');
        if (exQ && exQ.subQ) {
          const feelOpt = exQ.subQ.options.find(o => o.val === r.answers.exerciseFeel);
          if (feelOpt) {
            chips.appendChild(h('span', {className: 'history-chip'}, feelOpt.emoji + ' 运动后'));
          }
        }
      }

      if (r.note) item.appendChild(h('div', {className: 'history-note'}, r.note));

      // Vent indicator (level only, no text)
      if (r.answers.vent >= 2) {
        item.appendChild(h('div', {className: 'history-vent-indicator'}, '🔒 有吐槽记录'));
      }

      content.appendChild(item);
    });
  }
  app.appendChild(content);
}

/* ===== Report page ===== */
function renderReport(app) {
  app.appendChild(h('div', {className: anim('header')},
    h('div', {className: 'header-shuttle', innerHTML: SHUTTLE_SVG}),
    h('h1', null, '看诊报告'),
    h('div', {className: 'sub'}, '自动生成，给医生看的')
  ));

  const content = h('div', {className: 'content'});

  if (records.length < 3) {
    content.appendChild(h('div', {className: 'empty-state'},
      `至少记录3天才能生成报告\n目前已记录 ${records.length} 天 🏸`
    ));
    app.appendChild(content);
    return;
  }

  const schoolRecs = records.filter(r => (r.mode || 'school') === 'school');
  const restRecs = records.filter(r => r.mode === 'rest');
  const totalDays = records.length;

  const dimColors = {
    attention:'#1A8A5C', initiation:'#E8553A', memory:'#6B5BAE', emotion:'#1A3BC2',
    time:'#D4960A', body:'#C46A2A', sleep:'#7B4BAE', outing:'#1A7A7A',
    exercise:'#1A8A5C', timeSpent:'#D4960A', boredom:'#C46A2A', vent:'#C24B6E'
  };

  let docText = `脑子天气预报 — 观察报告\n`;
  docText += `观察周期：${records[0].date} 至 ${records[records.length-1].date}（共${totalDays}天，上学日${schoolRecs.length}天，休息日${restRecs.length}天）\n\n`;

  // Shared dimensions comparison
  const sharedIds = ['attention', 'emotion', 'sleep', 'body'];
  content.appendChild(h('div', {className: anim('report-section-header')},
    h('span', {className: 'section-icon'}, '📊'), '重叠维度对比（上学日 vs 休息日）'
  ));

  sharedIds.forEach(dimId => {
    const qSchool = Q_SCHOOL.find(q => q.id === dimId);
    const qRest = Q_REST.find(q => q.id === dimId);
    if (!qSchool) return;
    const maxVal = qSchool.options[qSchool.options.length - 1].val;

    const sec = h('div', {className: anim('report-dim-card')});
    sec.appendChild(h('div', {className: 'report-dim-label'}, h('span', null, qSchool.icon), qSchool.label));

    // School stats
    const sVals = schoolRecs.map(r => r.answers[dimId]).filter(v => v !== undefined);
    const rVals = restRecs.map(r => r.answers[dimId]).filter(v => v !== undefined);

    let statText = '';
    if (sVals.length > 0) {
      const sAvg = sVals.reduce((a,b) => a+b, 0) / sVals.length;
      const sHc = sVals.filter(v => v >= Math.ceil(maxVal * 0.66)).length;
      const sHp = Math.round(sHc / sVals.length * 100);
      const sSev = sAvg <= maxVal * 0.33 ? '轻微' : sAvg <= maxVal * 0.66 ? '中等' : '明显';
      statText += `🏫 上学日（${schoolRecs.length}天）：${sHp}%中-重度，平均${sSev}`;
      docText += `【${qSchool.label}】上学日${schoolRecs.length}天中${sHp}%中-重度，平均${sSev}`;
    }
    if (rVals.length > 0) {
      const rAvg = rVals.reduce((a,b) => a+b, 0) / rVals.length;
      const rHc = rVals.filter(v => v >= Math.ceil(maxVal * 0.66)).length;
      const rHp = Math.round(rHc / rVals.length * 100);
      const rSev = rAvg <= maxVal * 0.33 ? '轻微' : rAvg <= maxVal * 0.66 ? '中等' : '明显';
      if (statText) statText += '\n';
      statText += `🏖️ 休息日（${restRecs.length}天）：${rHp}%中-重度，平均${rSev}`;
      docText += `；休息日${restRecs.length}天中${rHp}%中-重度，平均${rSev}`;
    }
    docText += '\n';

    if (statText) {
      sec.appendChild(h('div', {className: 'report-summary'}, statText));
    }
    content.appendChild(sec);
  });

  // School-only dimensions
  if (schoolRecs.length > 0) {
    const nd1 = h('div', {className: 'net-divider'});
    nd1.appendChild(h('span', {className: 'net-label'}, '—— 中场休息 ——'));
    content.appendChild(nd1);

    content.appendChild(h('div', {className: anim('report-section-header')},
      h('span', {className: 'section-icon'}, '🏫'), '上学日专属维度'
    ));

    docText += '\n--- 上学日专属 ---\n';
    ['initiation', 'memory', 'time'].forEach(dimId => {
      const q = Q_SCHOOL.find(qq => qq.id === dimId);
      if (!q) return;
      const maxVal = q.options[q.options.length - 1].val;
      const vals = schoolRecs.map(r => r.answers[dimId]).filter(v => v !== undefined);
      if (vals.length === 0) return;

      const sec = h('div', {className: anim('report-dim-card')});
      sec.appendChild(h('div', {className: 'report-dim-label'}, h('span', null, q.icon), q.label));

      const avg = vals.reduce((a,b) => a+b, 0) / vals.length;
      const hc = vals.filter(v => v >= Math.ceil(maxVal * 0.66)).length;
      const hp = Math.round(hc / vals.length * 100);
      const sev = avg <= maxVal * 0.33 ? '轻微' : avg <= maxVal * 0.66 ? '中等' : '明显';

      sec.appendChild(h('div', {className: 'report-summary'},
        `${schoolRecs.length}天中${hp}%中-重度，平均${sev}`
      ));
      docText += `【${q.label}】${schoolRecs.length}天中${hp}%中-重度，平均${sev}\n`;
      content.appendChild(sec);
    });
  }

  // Rest-only dimensions
  if (restRecs.length > 0) {
    const nd2 = h('div', {className: 'net-divider'});
    nd2.appendChild(h('span', {className: 'net-label'}, '—— 中场休息 ——'));
    content.appendChild(nd2);

    content.appendChild(h('div', {className: anim('report-section-header')},
      h('span', {className: 'section-icon'}, '🏖️'), '休息日专属维度'
    ));

    docText += '\n--- 休息日专属 ---\n';
    ['outing', 'exercise', 'timeSpent', 'boredom'].forEach(dimId => {
      const q = Q_REST.find(qq => qq.id === dimId);
      if (!q) return;
      const vals = restRecs.map(r => r.answers[dimId]).filter(v => v !== undefined);
      if (vals.length === 0) return;

      const sec = h('div', {className: anim('report-dim-card')});
      sec.appendChild(h('div', {className: 'report-dim-label'}, h('span', null, q.icon), q.label));

      if (dimId === 'outing') {
        // Distribution for outing
        const counts = [0,0,0,0];
        vals.forEach(v => { if (counts[v] !== undefined) counts[v]++; });
        const labels = ['宅家','短暂外出','大半天外出','全天外出'];
        let txt = labels.map((l, i) => `${l}${counts[i]}天`).join('，');
        sec.appendChild(h('div', {className: 'report-summary'}, txt));
        docText += `【出门情况】${txt}\n`;
      } else if (dimId === 'exercise') {
        // Exercise type distribution
        const counts = [0,0,0,0];
        vals.forEach(v => { if (counts[v] !== undefined) counts[v]++; });
        const labels = ['没运动','走路','其他运动','羽毛球'];
        let txt = labels.map((l, i) => `${l}${counts[i]}天`).join('，');
        // Exercise feel summary
        const feelVals = restRecs.map(r => r.answers.exerciseFeel).filter(v => v !== undefined);
        if (feelVals.length > 0) {
          const positive = feelVals.filter(v => v <= 2).length;
          txt += `\n运动后感受：${positive}/${feelVals.length}次为正面反馈`;
        }
        sec.appendChild(h('div', {className: 'report-summary'}, txt));
        docText += `【运动情况】${txt}\n`;
      } else {
        const maxVal = q.options[q.options.length - 1].val;
        const avg = vals.reduce((a,b) => a+b, 0) / vals.length;
        const hc = vals.filter(v => v >= Math.ceil(maxVal * 0.66)).length;
        const hp = Math.round(hc / vals.length * 100);
        const sev = avg <= maxVal * 0.33 ? '轻微' : avg <= maxVal * 0.66 ? '中等' : '明显';
        sec.appendChild(h('div', {className: 'report-summary'},
          `${restRecs.length}天中${hp}%中-重度，平均${sev}`
        ));
        docText += `【${q.label}】${restRecs.length}天中${hp}%中-重度，平均${sev}\n`;
      }
      content.appendChild(sec);
    });
  }

  // Vent frequency (no text)
  const ventSchool = schoolRecs.filter(r => r.answers.vent >= 2).length;
  const ventRest = restRecs.filter(r => r.answers.vent >= 2).length;
  if (ventSchool + ventRest > 0) {
    docText += `\n【情绪压力信号】过去${totalDays}天中${ventSchool + ventRest}天有明显不满情绪（上学日${ventSchool}天/休息日${ventRest}天）\n`;
  }

  // Notes
  const notes = records.filter(r => r.note).map(r => `${r.date}(${(r.mode||'school')==='school'?'上学':'休息'}): ${r.note}`);
  if (notes.length > 0) {
    docText += '\n【自由备注摘录】\n' + notes.slice(-5).join('\n');
  }

  // Exportable text
  const nd3 = h('div', {className: 'net-divider'});
  nd3.appendChild(h('span', {className: 'net-label'}, '—— 可导出区域 ——'));
  content.appendChild(nd3);

  const dc = h('div', {className: anim('report-for-doc')});
  dc.appendChild(h('div', {className: 'report-for-doc-title'}, '📋 可复制给医生的文字版'));
  dc.appendChild(h('div', {className: 'report-for-doc-text'}, docText));
  dc.appendChild(h('button', {className: 'btn-copy', onclick: () => {
    navigator.clipboard.writeText(docText).then(() => {
      toastData = {icon: '✅', text: '已复制到剪贴板', sub: '可以直接发给姐姐或给医生看'};
      render();
      setTimeout(dismissToast, 1800);
    }).catch(() => {
      const range = document.createRange();
      range.selectNodeContents(dc.querySelector('.report-for-doc-text'));
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    });
  }}, '复制报告文字'));

  // Weekly report image button
  if (getWeekRecords().length >= 1) {
    dc.appendChild(h('button', {className: 'btn-copy', style: {marginTop: '8px', background: 'var(--acc-teal)'}, onclick: openWeeklyReport}, '📸 生成本周周报图片'));
  }

  content.appendChild(dc);
  app.appendChild(content);
}

/* ===== Settings page ===== */
function renderSettings(app) {
  app.appendChild(h('div', {className: anim('header')},
    h('div', {className: 'header-shuttle', innerHTML: SHUTTLE_SVG}),
    h('h1', null, '设置')
  ));

  const content = h('div', {className: 'content'});
  const schoolCount = records.filter(r => (r.mode || 'school') === 'school').length;
  const restCount = records.filter(r => r.mode === 'rest').length;

  content.appendChild(h('div', {className: anim('setting-row')},
    h('div', {className: 'setting-label'}, `已记录 ${records.length} 天（上学${schoolCount} / 休息${restCount}）`)
  ));

  content.appendChild(h('div', {className: anim('setting-row')},
    h('div', {className: 'setting-label'}, '导出数据（JSON）'),
    h('button', {className: 'setting-action setting-export', onclick: () => {
      // Export without ventText
      const exportData = records.map(r => {
        const copy = {...r};
        delete copy.ventText;
        return copy;
      });
      const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'brain-weather-data.json';
      a.click();
    }}, '导出')
  ));

  content.appendChild(h('div', {className: anim('setting-row')},
    h('div', {className: 'setting-label'}, '导入数据'),
    h('button', {className: 'setting-action setting-export', onclick: () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error('not array');
            // Merge by id, don't overwrite existing
            const existingIds = new Set(records.map(r => r.id));
            let added = 0;
            imported.forEach(r => {
              if (!r.id) r.id = uid();
              if (!r.mode) r.mode = 'school'; // legacy
              if (!existingIds.has(r.id)) {
                records.push(r);
                added++;
              }
            });
            records.sort((a, b) => (a.ts || 0) - (b.ts || 0));
            saveData();
            toastData = {icon: '✅', text: `导入成功`, sub: `新增 ${added} 条记录`};
            render();
            setTimeout(dismissToast, 1800);
          } catch(err) {
            toastData = {icon: '❌', text: '导入失败', sub: '文件格式不对'};
            render();
            setTimeout(dismissToast, 1800);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }}, '导入')
  ));

  content.appendChild(h('div', {className: anim('setting-row')},
    h('div', {className: 'setting-label'}, '清除所有数据'),
    h('button', {className: 'setting-action setting-danger', onclick: () => {
      if (confirm('确定要清除所有记录吗？这个操作不能撤销。')) {
        records = [];
        saveData();
        toastData = {icon: '🗑️', text: '已清除', sub: ''};
        render();
        setTimeout(dismissToast, 1500);
      }
    }}, '清除')
  ));

  const inst = h('div', {className: anim('instruction-card')});
  inst.appendChild(h('div', {className: 'instruction-title'}, '📱 添加到主屏幕'));
  inst.appendChild(h('div', {className: 'instruction-steps', innerHTML:
    'Safari打开这个页面 →<br>' +
    '点底部中间的 <b>分享按钮</b>（方框+箭头那个）→<br>' +
    '往下滑找到 <b>"添加到主屏幕"</b> →<br>' +
    '点"添加"<br><br>' +
    '之后桌面上就会出现一个图标，打开跟app一样 ✨'
  }));
  content.appendChild(inst);

  content.appendChild(h('div', {className: 'empty-state', style: {marginTop: '32px'}},
    '🏸 脑子天气预报 v' + APP_VERSION +
    '\n姐姐给你做的\n\n你的大脑值得被好好观察\n它虽然经常掉线 但一直在努力'
  ));

  app.appendChild(content);
}

/* ===== Init ===== */
loadData();

// Check if we need to show update log
try {
  const seenVersion = localStorage.getItem('brainweather_seen_version');
  if (seenVersion !== APP_VERSION) {
    showUpdateLog = true;
  }
} catch(e) {}

// Check for Sunday weekly report reminder
showWeeklyReminder = shouldShowWeeklyReminder();

render();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js?v=2.1.1').catch(() => {});
}

})();
</script>
</body>
</html>
